{% extends 'worker/index.html' %}
{% block content %}
{% load static %}
<div class="row">
  <div class="col-sm-12">
    <div class="home-tab">
      <div class="d-sm-flex align-items-center justify-content-between border-bottom">
        <ul class="nav nav-tabs" role="tablist">
          <li class="nav-item">
            <span class="nav-link active ps-0" id="home-tab" data-bs-toggle="tab" role="tab" aria-controls="overview" aria-selected="true">Overview</span>
          </li>
        </ul>
        <div>
          
        </div>
      </div>
      <div class="tab-content tab-content-basic">
        <div class="tab-pane fade show active" id="overview" role="tabpanel" aria-labelledby="overview"> 
          <div class="row">
            <div class="col-sm-12">
              <div class="statistics-details d-flex align-items-center justify-content-around">
                <div>
                  <p class="statistics-title">Total assigned work</p>
                  <i class="mdi mdi-android-studio h3"></i>
                  <h3 class="rate-percentage d-inline">{{t}}</h3>
                </div>
                <div>
                  <p class="statistics-title">Total completed work</p>
                  <i class="mdi mdi-checkbox-marked-outline h3"></i>
                  <h3 class="rate-percentage d-inline">{{c}}</h3>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
