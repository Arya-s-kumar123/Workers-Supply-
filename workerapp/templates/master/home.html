{% extends 'master/index.html' %}
{% block content %}
{% load static %}
<div class="row">
  <div class="col-sm-12">
    <div class="home-tab">
      <div class="d-sm-flex align-items-center justify-content-between border-bottom">
        <ul class="nav nav-tabs" role="tablist">
          <li class="nav-item">
            <a class="nav-link active ps-0" id="home-tab" data-bs-toggle="tab" href="#overview" role="tab" aria-controls="overview" aria-selected="true">Overview</a>
          </li>
        </ul>
        <div>
        </div>
      </div>
      <div class="tab-content tab-content-basic">
        <div class="tab-pane fade show active" id="overview" role="tabpanel" aria-labelledby="overview"> 
          <div class="row">
            <div class="col-sm-12">
              <div class="statistics-details d-flex align-items-center justify-content-between">
                <div>
                  <p class="statistics-title">Total services</p>
                  <h3 class="rate-percentage"><i class=""></i> {{s}}</h3>
                </div>
                <div>
                  <p class="statistics-title">Total Workers</p>
                  <h3 class="rate-percentage">{{w}}</h3>
                </div>
                <div>
                  <p class="statistics-title">Total service request</p>
                  <h3 class="rate-percentage"><i class=""></i> {{t}}</h3>
                </div>
                <div>
                  <p class="statistics-title">Total pending works</p>
                  <h3 class="rate-percentage"><i class=""></i> {{p}}</h3>
                </div>
                <div>
                  <p class="statistics-title">Total completed works</p>
                  <h3 class="rate-percentage"><i class=""></i> {{c}}</h3>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
