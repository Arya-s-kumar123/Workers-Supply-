{% extends 'user/index.html' %}
{% block content %}
{% load static %}

<main id="main">

    <section id="breadcrumbs" class="breadcrumbs">
        <div class="container">
  
          <div class="d-flex justify-content-between align-items-center">
            <h2>Team</h2>
            <ol>
              <li><a href="index.html">Home</a></li>
              <li>Team</li>
            </ol>
          </div>
  
        </div>
      </section><!-- End Breadcrumbs -->
  
      <!-- ======= Our Team Section ======= -->
      <section id="team" class="team section-bg">
        <div class="container">
  
          <div class="section-title" data-aos="fade-up">
            <h2>Our <strong>Workers</strong></h2>
          </div>
  
          <div class="row">
            {% if data %}
            {% for i in data %}
            <div class="col-lg-3 col-md-3 d-flex align-items-stretch">
              <div class="member" data-aos="fade-up">
                <div class="member-img">
                  <img src="{{i.image}}" class="img-fluid w-100" style="min-height: 300px;max-width:250" alt="">
                </div>
                <div class="member-info">
                  <h4>{{i.name}}</h4>
                  <span>{{i.service.service_name}}</span>
                </div>
              </div>
            </div>
            {% endfor %}
            {% else %}
            <div class="col-lg-3 col-md-6 d-flex align-items-stretch">Not found any worker</div>
            {% endif  %}
          </div>
  
        </div>
      </section><!-- End Our Team Section -->
  </main><!-- End #main -->


  
{% endblock content %}
