{% extends 'index.html' %}
{% block content %}
{% load static %}

<main id="main">

    <!-- ======= Breadcrumbs ======= -->
    <section id="breadcrumbs" class="breadcrumbs">
      <div class="container">

        <div class="d-flex justify-content-between align-items-center">
          <h2>Master register</h2>
          <ol>
            <li><a href="index.html">Home</a></li>
            <li>Master register</li>
          </ol>
        </div>

      </div>
    </section><!-- End Breadcrumbs -->

    <!-- ======= Contact Section ======= -->

    <section id="contact" class="contact">
      <div class="container">
        <h3>Master register</h3>
        <div class="row mt-5" data-aos="fade-up">
          {% if messages %}
            {% for message in messages %}
            <h6 class="alert alert-danger">{{message}}</h6>       
            {% endfor %}
        {% endif %}         
          <div class="col-lg-6">
            <form action="/master_reg/" method="post">
              {% csrf_token %}
              <div class="row">
                <div class="col-md-12">
                  <input type="text" name="username" class="form-control mt-3" id="username" placeholder="Username" required>
                </div>
                <div class="col-md-12">
                  <input type="password" class="form-control mt-3" name="password" id="password" placeholder="Password" required>
                </div>
              </div>
              
              <div class="mt-2"><button type="submit" class="btn btn-success">Register</button></div>
            </form>
          </div>

        </div>

      </div>
    </section><!-- End Contact Section -->

  </main><!-- End #main -->
{% endblock content %}
